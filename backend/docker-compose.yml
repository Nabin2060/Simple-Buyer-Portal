version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: buyer_portal_db_new
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: buyer_portal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_new:/var/lib/postgresql/data

volumes:
  postgres_data_new:
